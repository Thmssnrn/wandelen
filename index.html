<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pointer FINAL</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:sans-serif;
}

#arrow {
  font-size:90px;
  transition: transform 0.08s linear;
}

#status {
  margin-top:10px;
  font-size:14px;
  opacity:0.85;
}

#debug {
  margin-top:12px;
  font-size:12px;
  white-space:pre;
  text-align:left;
  opacity:0.9;
  max-width:90vw;
}

button {
  margin-top:12px;
  padding:12px 18px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="arrow">⬆️</div>
<button onclick="init()">Start</button>

<div id="status">idle</div>
<div id="debug"></div>

<script>
const target = {
  lat: 52.9586,
  lon: 4.7593
};

let position = null;
let heading = null;

let gpsOK = false;
let compassOK = false;

let lastUpdate = 0;

// 🔴 hard error catcher
window.onerror = (m) => {
  document.getElementById("debug").innerText = "JS ERROR:\n" + m;
};

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function dbg(obj) {
  document.getElementById("debug").innerText =
    JSON.stringify(obj, null, 2);
}

// 🚀 INIT
async function init() {

  setStatus("init...");

  // 🧭 compass permission (iOS)
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== "granted") {
        setStatus("NO COMPASS PERMISSION");
        return;
      }
    } catch(e) {
      setStatus("COMPASS ERROR");
      return;
    }
  }

  // 🧭 compass
  window.addEventListener("deviceorientation", (e) => {

    if (typeof e.alpha === "number") {
      heading = 360 - e.alpha;
      compassOK = true;
    } else {
      compassOK = false;
    }
  });

  // 📍 GPS
  if (!navigator.geolocation) {
    setStatus("NO GPS API");
    return;
  }

  navigator.geolocation.watchPosition(
    p => {
      position = p.coords;
      gpsOK = true;
    },
    e => {
      gpsOK = false;
      setStatus("GPS ERROR: " + e.message);
    },
    { enableHighAccuracy: true }
  );

  setStatus("running");

  startLoop();
}

// 🔁 ALWAYS RUNNING LOOP (BELANGRIJK)
function startLoop() {
  setInterval(() => {
    tryUpdate();
  }, 100);
}

// 📐 bearing
function bearing(lat1, lon1, lat2, lon2) {
  const toRad = x => x * Math.PI / 180;
  const toDeg = x => x * 180 / Math.PI;

  const dLon = toRad(lon2 - lon1);
  lat1 = toRad(lat1);
  lat2 = toRad(lat2);

  const y = Math.sin(dLon) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) -
            Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// 📏 distance
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return Math.round(2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 🔄 CORE LOOP
function tryUpdate() {

  const now = Date.now();

  // altijd debug tonen
  dbg({
    gpsOK,
    compassOK,
    position: !!position,
    heading: heading,
    age: position ? Math.round((now - lastUpdate)/1000) + "s" : "no gps"
  });

  // state message
  if (!position && !heading) {
    setStatus("NO DATA");
    return;
  }

  if (!position) {
    setStatus("WAIT GPS");
    return;
  }

  if (!heading && heading !== 0) {
    setStatus("WAIT COMPASS");
    return;
  }

  // update ok
  lastUpdate = now;
  setStatus("LIVE");

  const b = bearing(
    position.latitude,
    position.longitude,
    target.lat,
    target.lon
  );

  const angle = b - heading;

  document.getElementById("arrow").style.transform =
    `rotate(${angle}deg)`;
}
</script>

</body>
</html>
