<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pointer Debug v2</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:sans-serif;
}

#arrow {
  font-size:90px;
  transition: transform 0.1s linear;
}

#status {
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

#debug {
  margin-top:15px;
  font-size:12px;
  white-space:pre;
  text-align:left;
  opacity:0.9;
}

button {
  margin-top:15px;
  padding:12px 18px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="arrow">⬆️</div>
<button onclick="init()">Start</button>

<div id="status">Idle</div>
<div id="debug"></div>

<script>
const target = {
  lat: 52.9586,
  lon: 4.7593
};

let position = null;
let heading = null;

let gpsOK = false;
let compassOK = false;

// 🔴 HARD DEBUG
window.onerror = (m) => {
  document.getElementById("debug").innerText = "JS ERROR:\n" + m;
};

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function debug(obj) {
  document.getElementById("debug").innerText =
    JSON.stringify(obj, null, 2);
}

// 🚀 START
async function init() {

  setStatus("Init...");

  // 🧭 Compass permission (iOS vereist user gesture)
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res !== "granted") {
      setStatus("Kompas geweigerd ❌");
      return;
    }
  }

  // 🧭 Compass listener
  window.addEventListener("deviceorientation", (e) => {

    if (typeof e.alpha === "number") {
      heading = 360 - e.alpha;
      compassOK = true;
    } else {
      compassOK = false;
    }

    tryUpdate();
  });

  // 📍 GPS
  if (!navigator.geolocation) {
    setStatus("Geen GPS API ❌");
    return;
  }

  navigator.geolocation.watchPosition(
    pos => {
      position = pos.coords;
      gpsOK = true;
      tryUpdate();
    },
    err => {
      gpsOK = false;
      setStatus("GPS error: " + err.message);
    },
    { enableHighAccuracy: true }
  );

  setStatus("Wachten op GPS + kompas...");
}

// 📐 bearing
function bearing(lat1, lon1, lat2, lon2) {
  const toRad = x => x * Math.PI / 180;
  const toDeg = x => x * 180 / Math.PI;

  const dLon = toRad(lon2 - lon1);
  lat1 = toRad(lat1);
  lat2 = toRad(lat2);

  const y = Math.sin(dLon) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) -
            Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);

  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// 📏 distance
function distance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;

  return Math.round(2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 🔄 ONLY UPDATE WHEN READY
function tryUpdate() {

  debug({
    gpsOK,
    compassOK,
    position: position ? "YES" : "NO",
    heading: heading
  });

  if (!gpsOK || !compassOK || !position || heading === null) {
    setStatus("Wachten op data...");
    return;
  }

  const b = bearing(
    position.latitude,
    position.longitude,
    target.lat,
    target.lon
  );

  const angle = b - heading;

  document.getElementById("arrow").style.transform =
    `rotate(${angle}deg)`;

  const dist = distance(
    position.latitude,
    position.longitude,
    target.lat,
    target.lon
  );

  setStatus("LIVE");

  debug({
    gpsOK,
    compassOK,
    lat: position.latitude.toFixed(6),
    lon: position.longitude.toFixed(6),
    heading: heading.toFixed(1),
    bearing: b.toFixed(1),
    distance: dist + "m"
  });
}
</script>

</body>
</html>
