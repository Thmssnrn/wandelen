<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPX Kompas</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  
  <!-- iPhone icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/iphone180.png">
  <link rel="apple-touch-icon" sizes="120x120" href="./icons/iphone120.png">
  
  <!-- iPad icons -->
  <link rel="apple-touch-icon" sizes="167x167" href="./icons/ipadPro167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/ipad152.png">
  
  <!-- Spotlight icons -->
  <link rel="apple-touch-icon" sizes="120x120" href="./icons/spotlight120.png">
  <link rel="apple-touch-icon" sizes="80x80" href="./icons/spotlight80.png">
  
</head>

<body>
  <div id="userGestureOverlay"></div>

  <div id="controls">
    <input type="file" id="gpxUpload" style="display:none" accept=".gpx">
    <label for="gpxUpload" id="fileButton">Selecteer bestand</label>
    
    <button id="startButton">Start kompas</button>

    <button id="toggleViewButton">Toon kaart</button>
  </div>

  <div id="nextTurn">
    <span id="nextTurnArrow" style="transform: rotate(270deg);">⤵</span>
    <span> </span>
    <span id="nextTurnDistance">Over 0 m</span>
  </div>
  
  <div id="compassView" class="view active">
    <div id="arrowRotation"></div>
    <div id="arrow">↑</div>
  </div>
  
  <div id="mapView" class="view">
    <div id="mapContainer">
      <canvas id="mapCanvas"></canvas>
      <div id="userDot"></div>
    </div>
    
    <canvas id="elevationCanvas"></canvas>
  </div>

  <div id="infoBar">
    <span id="distance">Restafstand: 0 km</span>
    <span>•</span>
    <span id="elevation">⭡ 0 m, ⭣ 0 m</span>
  </div>

  <div id="debug"></div>
  
  <script src="./app.js"></script>
</body>
</html>
