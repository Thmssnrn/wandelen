<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pointer Debug</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:sans-serif;
}
#arrow { font-size:90px; }
#debug { font-size:12px; white-space:pre; margin-top:10px; }
button { padding:12px; margin-top:10px; }
</style>
</head>

<body>

<div id="arrow">⬆️</div>
<button onclick="init()">Start</button>
<div id="status">idle</div>
<div id="debug"></div>

<script>

const target = { lat: 52.9586, lon: 4.7593 };

let pos = null;
let heading = 0;

function log(t) {
  document.getElementById("status").innerText = t;
}

function dbg(obj) {
  document.getElementById("debug").innerText =
    JSON.stringify(obj, null, 2);
}

// 🔥 HARD ERROR CATCH
window.onerror = (m) => dbg({error:m});

async function init() {

  log("init...");

  // compass permission
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    const r = await DeviceOrientationEvent.requestPermission();
    log("motion: " + r);
    if (r !== "granted") return;
  }

  // 🧭 SAFE compass
  window.addEventListener("deviceorientation", (e) => {

    if (typeof e.alpha !== "number") {
      dbg({ warning: "no alpha", event: e });
      return;
    }

    heading = 360 - e.alpha;
    update();
  });

  // 📍 GPS
  if (!navigator.geolocation) {
    log("no GPS");
    return;
  }

  navigator.geolocation.watchPosition(
    p => {
      pos = p.coords;
      log("gps ok");
      update();
    },
    e => dbg({ gpsError: e.message }),
    { enableHighAccuracy:true }
  );

  log("running");
}

// 📐 bearing
function bearing(lat1, lon1, lat2, lon2) {
  const toRad = x => x*Math.PI/180;
  const toDeg = x => x*180/Math.PI;

  const dLon = toRad(lon2-lon1);
  lat1 = toRad(lat1);
  lat2 = toRad(lat2);

  const y = Math.sin(dLon)*Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2)
          - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);

  return (toDeg(Math.atan2(y,x))+360)%360;
}

// 🔄 update UI
function update() {
  if (!pos) return;

  const b = bearing(pos.latitude,pos.longitude,target.lat,target.lon);
  const angle = b - heading;

  document.getElementById("arrow").style.transform =
    `rotate(${angle}deg)`;

  dbg({
    lat: pos.latitude,
    lon: pos.longitude,
    heading,
    targetBearing: b
  });
}

</script>

</body>
</html>
